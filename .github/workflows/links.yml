name: Daily Link Check

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
  pull_request:
    branches: [main]
    paths:
      - '**/*.md'
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Check Links
        id: link-check
        uses: lycheeverse/lychee-action@v1
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,204,206,301,302
            --exclude-mail
            --timeout 30
            --max-retries 3
            --max-concurrency 10
            '**/*.md'
          fail: false
          output: ./link-report.md

      # Slack notification on scheduled and manual runs
      - name: Notify Slack
        if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ steps.link-check.outputs.exit_code == '0' && '✅ Link Check Passed' || '❌ Broken Links Found' }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Status:*\n${{ steps.link-check.outputs.exit_code == '0' && 'All links valid' || 'Issues detected' }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Full Report>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      # Always find existing issue (needed for both create/update and close)
      - name: Find Existing Issue
        id: last_issue
        uses: micalevisk/last-issue-action@v2
        with:
          state: open
          labels: broken-link, automated
        continue-on-error: true

      # Create or update issue when broken links found
      - name: Create or Update Issue
        if: steps.link-check.outputs.exit_code != '0'
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: Broken Links Detected
          content-filepath: ./link-report.md
          labels: broken-link, automated
          issue-number: ${{ steps.last_issue.outputs.issue-number }}

      # Auto-close issue when all links are fixed
      - name: Close Issue if Fixed
        if: steps.link-check.outputs.exit_code == '0' && steps.last_issue.outputs.issue-number != ''
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ steps.last_issue.outputs.issue-number }}
          comment: All links are now valid. Closing automatically.
